name: Update Panchang JSON API

on:
  schedule:
    # Runs at 1:00 AM and 4:00 AM IST (GitHub Actions cron schedules use UTC).
    - cron: "30 19,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-panchang-json-api
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Sync latest main before scraping
        run: git pull --ff-only origin main
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate single-file Panchang API
        run: python tools/scrape_panchang.py
      - name: Validate generated JSON
        run: |
          python -m json.tool api/panchang-data.json > /dev/null
          python - <<'PY'
          import json
          from collections import Counter

          with open("api/panchang-data.json", encoding="utf-8") as file:
              data = json.load(file)

          months = Counter(day["date"][:7] for day in data["monthDays"])
          print(f"Generated days: {len(data['monthDays'])}")
          print(f"Generated months: {len(months)}")
          print(f"Generated events: {len(data['events'])}")
          if len(months) != 12:
              raise SystemExit("Expected full-year data with 12 months")
          PY
      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/panchang-data.json
          if git diff --cached --quiet; then
            echo "No Panchang JSON changes to commit."
          else
            git commit -m "chore: update Panchang JSON data"
            git push origin HEAD:main
          fi
